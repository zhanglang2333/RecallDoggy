<!DOCTYPE html> <html lang="zh-CN"> 
<head> <meta charset="UTF-8"> <meta 
name="viewport" 
content="width=device-width, 
initial-scale=1.0"> <title>初始设置 
- RecallDoggy</title> <style> * { 
margin:0; padding:0; 
box-sizing:border-box; } body {
    font-family: -apple-system, 
    BlinkMacSystemFont, "Segoe UI", 
    Roboto, sans-serif; height: 
    100vh; display: flex; 
    justify-content: center; 
    align-items: center; 
    background: 
    linear-gradient(135deg, 
    #A0D8EF, #7CC2DE);
}
.box { background: white; padding: 
    40px; border-radius: 16px; 
    width: 320px; box-shadow: 0 
    15px 40px rgba(0,0,0,0.2);
}
h2 { text-align: center; 
margin-bottom: 10px; color: #333; } 
p { text-align: center; color: 
#999; font-size: 13px; 
margin-bottom: 20px; } input { 
    width: 100%; padding: 12px; 
    margin-bottom: 15px; border: 
    2px solid #e0e0e0; 
    border-radius: 8px; font-size: 
    14px;
}
input:focus { outline: none; 
border-color: #A0D8EF; } button {
    width: 100%; padding: 12px; 
    border: none; border-radius: 
    8px; background: 
    linear-gradient(135deg, 
    #A0D8EF, #7CC2DE);
    color: white; font-size: 16px; 
    font-weight: bold; cursor: 
    pointer;
}
.message { text-align: center; 
margin-top: 10px; font-size: 14px; 
color: red; } </style> </head> 
<body> <div class="box">
    <h2>🐕 首次设置</h2> 
    <p>设置你的登录密码</p> <input 
    id="pw1" type="password" 
    placeholder="输入密码（至少6位）"> 
    <input id="pw2" type="password" 
    placeholder="确认密码"
           onkeypress="if(event.key==='Enter') 
           setup()">
    <button 
    onclick="setup()">确认</button> 
    <div id="msg" 
    class="message"></div>
</div> <script> async function 
setup() {
    const pw1 = 
    document.getElementById("pw1").value; 
    const pw2 = 
    document.getElementById("pw2").value; 
    const msg = 
    document.getElementById("msg"); 
    if (!pw1) { msg.innerText = 
    "请输入密码"; return; } if (pw1 
    !== pw2) { msg.innerText = 
    "两次密码不一致"; return; } if 
    (pw1.length < 6) { 
    msg.innerText = "密码至少6位"; 
    return; } const res = await 
    fetch("/setup", {
        method: "POST", headers: 
        {"Content-Type": 
        "application/json"}, body: 
        JSON.stringify({password: 
        pw1})
    });
    const data = await res.json(); 
    if (data.success) {
        window.location.href = "/";
    } else {
        msg.innerText = data.msg;
    }
}
</script> </body> </html>
