<!DOCTYPE html> <html lang="zh-CN"> 
<head>
    <meta charset="UTF-8"> <meta 
    name="viewport" 
    content="width=device-width, 
    initial-scale=1.0"> <title>📊 
    Dashboard - RecallDoggy</title> 
    <style>
        * { margin: 0; padding: 0; 
        box-sizing: border-box; } 
        body {
            font-family: 
            -apple-system, 
            BlinkMacSystemFont, 
            "Segoe UI", Roboto, 
            sans-serif; background: 
            linear-gradient(135deg, 
            #A0D8EF 0%, #7CC2DE 
            100%); min-height: 
            100vh; padding: 20px;
        }
        .container { max-width: 
        1000px; margin: 0 auto; } 
        .header {
            text-align: center; 
            color: white; 
            margin-bottom: 30px;
        }
        .header h1 { font-size: 
        2.2em; margin-bottom: 6px; 
        }
        .header p { opacity: 0.9; 
        font-size: 14px; } 
        .nav-link {
            display: inline-block; 
            margin-top: 10px; 
            color: white; 
            text-decoration: none; 
            background: 
            rgba(255,255,255,0.2); 
            padding: 6px 16px; 
            border-radius: 20px; 
            font-size: 13px;
        }
        .nav-link:hover { 
        background: 
        rgba(255,255,255,0.35); } 
        /* 总数大卡片 */ 
        .big-number {
            background: white; 
            border-radius: 16px; 
            padding: 30px; 
            text-align: center; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px 
            rgba(0,0,0,0.15);
        }
        .big-number .num { 
            font-size: 4em; 
            font-weight: 800; 
            color: #7CC2DE; 
            line-height: 1;
        }
        .big-number .label { color: 
        #999; font-size: 14px; 
        margin-top: 6px; } /* 双列 
        */ .grid2 { display: grid; 
        grid-template-columns: 1fr 
        1fr; gap: 20px; 
        margin-bottom: 20px; } 
        @media (max-width: 640px) { 
        .grid2 { 
        grid-template-columns: 1fr; 
        } }
        .card { background: white; 
            border-radius: 16px; 
            padding: 22px; 
            box-shadow: 0 10px 30px 
            rgba(0,0,0,0.15);
        }
        .card h2 { font-size: 
        1.1em; color: #555; 
        margin-bottom: 16px; } /* 
        分类柱状 */ .bar-row { 
        display: flex; align-items: 
        center; margin-bottom: 
        10px; } .bar-label {
            width: 70px; font-size: 
            13px; color: #666; 
            text-align: right; 
            margin-right: 10px; 
            overflow: hidden; 
            text-overflow: 
            ellipsis; white-space: 
            nowrap;
        }
        .bar-track { flex: 1; 
        background: #f0f0f0; 
        border-radius: 6px; height: 
        22px; overflow: hidden; } 
        .bar-fill {
            height: 100%; 
            border-radius: 6px; 
            background: 
            linear-gradient(90deg, 
            #A0D8EF, #7CC2DE);
            display: flex; 
            align-items: center; 
            justify-content: 
            flex-end; 
            padding-right: 8px; 
            font-size: 11px; color: 
            white; font-weight: 
            600; min-width: 28px; 
            transition: width 0.6s 
            ease;
        }
        /* 趋势图 */ .trend-chart 
            { display: flex; 
            align-items: flex-end; 
            justify-content: 
            space-between; height: 
            140px; padding-top: 
            10px;
        }
        .trend-bar-wrap { flex: 1; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        height: 100%; 
        justify-content: flex-end; 
        }
        .trend-bar { width: 28px; 
            border-radius: 6px 6px 
            0 0; background: 
            linear-gradient(180deg, 
            #A0D8EF, #7CC2DE);
            transition: height 0.6s 
            ease; min-height: 2px;
        }
        .trend-count { font-size: 
        11px; color: #7CC2DE; 
        font-weight: 700; 
        margin-bottom: 4px; } 
        .trend-date { font-size: 
        11px; color: #999; 
        margin-top: 6px; } /* 
        最近列表 */ .recent-item {
            padding: 10px 0; 
            border-bottom: 1px 
            solid #f0f0f0; display: 
            flex; justify-content: 
            space-between; 
            align-items: 
            flex-start;
        }
        .recent-item:last-child { 
        border-bottom: none; } 
        .recent-content { 
        font-size: 13px; color: 
        #333; flex: 1; line-height: 
        1.5; } .recent-meta { 
        font-size: 11px; color: 
        #aaa; white-space: nowrap; 
        margin-left: 12px; } 
        .recent-cat {
            display: inline-block; 
            background: #f0f9ff; 
            color: #7CC2DE; 
            padding: 1px 8px; 
            border-radius: 10px; 
            font-size: 11px; 
            margin-right: 6px;
        }
        .loading-text { text-align: 
        center; color: #999; 
        padding: 40px; }
    </style> </head> <body> <div 
class="container">
    <div class="header"> <h1>📊 
        RecallDoggy Dashboard</h1> 
        <p 
        id="updateTime">加载中...</p> 
        <a class="nav-link" 
        href="/">← 返回主页</a> <a 
        class="nav-link" 
        href="/logs">📋 日志</a>
    </div> <div class="big-number"> 
        <div class="num" 
        id="totalNum">-</div> <div 
        class="label">总记忆数 
        🐕</div>
    </div> <div class="grid2"> <div 
        class="card">
            <h2>📂 分类分布</h2> 
            <div id="catChart"><div 
            class="loading-text">加载中...</div></div>
        </div> <div class="card"> 
            <h2>📈 最近 7 
            天写入</h2> <div 
            id="trendChart"><div 
            class="loading-text">加载中...</div></div>
        </div> </div> <div 
    class="card">
        <h2>🕐 最近写入</h2> <div 
        id="recentList"><div 
        class="loading-text">加载中...</div></div>
    </div> </div> <script>
async function load() {
    try {
        const res = await fetch('/api/stats');
        const d = await res.json();
        document.getElementById('totalNum').textContent = d.total;
        document.getElementById('updateTime').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
        const cats = d.levels || {};
        const maxCat = Math.max(...Object.values(cats), 1);
        let catHtml = '';
        const sorted = Object.entries(cats).sort((a, b) => b[1] - a[1]);
        for (const [name, count] of sorted) {
            const pct = Math.round(count / maxCat * 100);
            catHtml += `<div class="bar-row"><div class="bar-label" title="${name}">${name}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%">${count}</div></div></div>`;
        }
        document.getElementById('catChart').innerHTML = catHtml || '<div class="loading-text">暂无数据</div>';
        const trend = d.trend || {};
        const maxT = Math.max(...Object.values(trend), 1);
        let trendHtml = '<div class="trend-chart">';
        for (const [date, count] of Object.entries(trend)) {
            const h = Math.round(count / maxT * 110);
            trendHtml += `<div class="trend-bar-wrap"><div class="trend-count">${count || ''}</div><div class="trend-bar" style="height:${h}px"></div><div class="trend-date">${date}</div></div>`;
        }
        trendHtml += '</div>';
        document.getElementById('trendChart').innerHTML = trendHtml;
        let recHtml = '';
        for (const item of (d.recent || [])) {
            recHtml += `<div class="recent-item"><div class="recent-content"><span class="recent-cat">${item.category}</span>${item.content}</div><div class="recent-meta">${item.time}</div></div>`;
        }
        document.getElementById('recentList').innerHTML = recHtml || '<div class="loading-text">暂无数据</div>';
    } catch (e) {
        document.getElementById('totalNum').textContent = '!';
        console.error(e);
    }
}
load(); setInterval(load, 30000);
</script> </body> </html>
